name: Validate DOCX Templates

on:
  pull_request:
    paths:
      - '**/*.docx'
  push:
    branches:
      - main
    paths:
      - '**/*.docx'
  workflow_dispatch:

jobs:
  validate-docx:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Validate DOCX Jinja2 templates
        uses: SuffolkLITLab/ALActions/valid_jinja2@main
